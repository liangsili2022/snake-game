<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --grid: #1a2332;
      --snake: #22c55e;
      --snake-head: #16a34a;
      --food: #ef4444;
      --text: #e7e9ea;
      --muted: #71767b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); font-family: 'Noto Sans SC', sans-serif; color: var(--text); overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 197, 94, 0.15), transparent), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(239, 68, 68, 0.08), transparent); pointer-events: none; z-index: 0; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 0.1em; background: linear-gradient(135deg, #22c55e, #16a34a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .score-row { display: flex; gap: 2rem; margin-bottom: 1rem; font-size: 1.1rem; color: var(--muted); }
    .score-row span { color: var(--text); font-weight: 700; }
    .game-wrapper { position: relative; padding: 12px; background: var(--grid); border-radius: 16px; box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 50px -12px rgba(0,0,0,0.5); }
    #gameCanvas { display: block; background: var(--bg); border-radius: 8px; image-rendering: pixelated; image-rendering: crisp-edges; }
    .overlay { position: absolute; inset: 12px; border-radius: 8px; background: rgba(15, 20, 25, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .overlay.visible { opacity: 1; pointer-events: auto; }
    .overlay h2 { font-size: 1.5rem; color: var(--text); }
    .overlay p { color: var(--muted); font-size: 0.95rem; }
    .btn { padding: 0.75rem 1.5rem; font-size: 1rem; font-family: inherit; font-weight: 700; color: var(--bg); background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 10px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35); }
    .btn:active { transform: translateY(0); }
    .hint { margin-top: 1rem; font-size: 0.85rem; color: var(--muted); }
    .hint kbd { display: inline-block; padding: 2px 6px; background: var(--grid); border-radius: 4px; font-family: monospace; }
  </style>
</head>
<body>
  <h1>贪吃蛇</h1>
  <div class="score-row">
    <div>得分: <span id="score">0</span></div>
    <div>最高: <span id="highScore">0</span></div>
  </div>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>准备开始</h2>
      <p>用方向键或 WASD 控制蛇的方向</p>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
    <div class="overlay" id="gameOverOverlay">
      <h2>游戏结束</h2>
      <p>得分: <span id="finalScore">0</span></p>
      <button class="btn" id="restartBtn">再来一局</button>
    </div>
  </div>
  <p class="hint"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制</p>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;
    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = 0, dy = 0;
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameLoop = null;
    let gameOver = false;
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const finalScoreEl = document.getElementById('finalScore');
    highScoreEl.textContent = highScore;
    function initGame() {
      const center = Math.floor(TILE_COUNT / 2);
      snake = [{ x: center, y: center }, { x: center - 1, y: center }, { x: center - 2, y: center }];
      dx = 1; dy = 0; score = 0; gameOver = false;
      scoreEl.textContent = score;
      spawnFood();
      startOverlay.classList.remove('visible');
      gameOverOverlay.classList.remove('visible');
    }
    function spawnFood() {
      let ok = false;
      do {
        food.x = Math.floor(Math.random() * TILE_COUNT);
        food.y = Math.floor(Math.random() * TILE_COUNT);
        ok = !snake.some(s => s.x === food.x && s.y === food.y);
      } while (!ok);
    }
    function draw() {
      ctx.fillStyle = '#0f1419';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(26, 35, 50, 0.8)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= TILE_COUNT; i++) {
        ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
      }
      const pad = 2;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - pad, 0, Math.PI*2);
      ctx.fill();
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const x = seg.x * GRID_SIZE + pad, y = seg.y * GRID_SIZE + pad, size = GRID_SIZE - pad*2;
        if (isHead) {
          ctx.fillStyle = '#16a34a';
          ctx.fillRect(x, y, size, size);
          ctx.fillStyle = '#0f1419';
          const eyeSize = 4, eyeOff = 6;
          if (dx === 1) { ctx.fillRect(x+size-eyeOff-eyeSize, y+4, eyeSize, eyeSize); ctx.fillRect(x+size-eyeOff-eyeSize, y+size-8, eyeSize, eyeSize); }
          else if (dx === -1) { ctx.fillRect(x+eyeOff, y+4, eyeSize, eyeSize); ctx.fillRect(x+eyeOff, y+size-8, eyeSize, eyeSize); }
          else if (dy === -1) { ctx.fillRect(x+4, y+eyeOff, eyeSize, eyeSize); ctx.fillRect(x+size-8, y+eyeOff, eyeSize, eyeSize); }
          else { ctx.fillRect(x+4, y+size-eyeOff-eyeSize, eyeSize, eyeSize); ctx.fillRect(x+size-8, y+size-eyeOff-eyeSize, eyeSize, eyeSize); }
        } else { ctx.fillStyle = '#22c55e'; ctx.fillRect(x, y, size, size); }
      });
    }
    function update() {
      if (gameOver) return;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) { endGame(); return; }
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) { endGame(); return; }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > highScore) { highScore = score; highScoreEl.textContent = highScore; localStorage.setItem('snakeHighScore', highScore); }
        spawnFood();
      } else snake.pop();
    }
    function endGame() { gameOver = true; finalScoreEl.textContent = score; gameOverOverlay.classList.add('visible'); cancelAnimationFrame(gameLoop); }
    let lastUpdate = 0;
    const FPS = 10;
    function gameTick(timestamp) {
      if (timestamp - lastUpdate >= 1000/FPS) { lastUpdate = timestamp; update(); }
      draw();
      if (!gameOver) gameLoop = requestAnimationFrame(gameTick);
    }
    function startGame() { initGame(); lastUpdate = performance.now(); gameLoop = requestAnimationFrame(gameTick); }
    document.addEventListener('keydown', (e) => {
      if (startOverlay.classList.contains('visible')) return;
      const key = e.key;
      if (key === 'ArrowUp' || key === 'w' || key === 'W') { if (dy !== 1) { dx = 0; dy = -1; } e.preventDefault(); }
      else if (key === 'ArrowDown' || key === 's' || key === 'S') { if (dy !== -1) { dx = 0; dy = 1; } e.preventDefault(); }
      else if (key === 'ArrowLeft' || key === 'a' || key === 'A') { if (dx !== 1) { dx = -1; dy = 0; } e.preventDefault(); }
      else if (key === 'ArrowRight' || key === 'd' || key === 'D') { if (dx !== -1) { dx = 1; dy = 0; } e.preventDefault(); }
    });
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    initGame();
    draw();
    startOverlay.classList.add('visible');
  </script>
</body>
</html>
