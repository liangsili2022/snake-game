<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Legend</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 24px; }
        .icon { width: 120px; height: 120px; background: linear-gradient(135deg, #4ade80, #22c55e); border-radius: 28px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 56px; }
        h1 { font-size: 32px; color: #fff; margin-bottom: 4px; }
        .subtitle { color: #4ade80; font-size: 18px; margin-bottom: 8px; }
        .tagline { color: #888; font-size: 15px; margin-bottom: 40px; }
        .badge { display: inline-block; margin: 0 auto; }
        .badge img { height: 54px; }
        .badge a { display: inline-block; }
        .links { margin-top: 32px; }
        .links a { color: #4ade80; text-decoration: none; margin: 0 16px; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">🐍</div>
    <h1>Snake Legend</h1>
    <p class="subtitle">Classic Snake, remixed for a world tour.</p>
    <p class="tagline">10 countries · skills · combos · premium upgrade</p>
    <div class="badge">
        <a href="https://apps.apple.com/app/id6744093498">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
        </a>
    </div>
    <div class="links">
        <a href="./privacy/">Privacy Policy</a>
        <a href="./support/">Support</a>
    </div>
</div>
</body>
</html>
